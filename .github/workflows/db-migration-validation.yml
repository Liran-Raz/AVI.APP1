name: db-migration-validation

# Validates ADDITIVE migrations against an EPHEMERAL, throwaway PostgreSQL
# service on the GitHub-hosted runner. It:
#   * uses NO secrets and NO Supabase/Production credentials,
#   * contacts NO customer database,
#   * applies migrations only to a disposable container that is destroyed when
#     the job ends,
#   * NEVER deploys or applies migrations to any remote/Production database.
# It exists purely to give real-PostgreSQL evidence (composite FK, ON DELETE
# NO ACTION, CHECK constraints, RLS, GRANT/REVOKE) for migration review.
# Migration application to Supabase remains a MANUAL, human-run Dashboard step.

on:
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/validation/**'
      - '.github/workflows/db-migration-validation.yml'
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/validation/**'
      - '.github/workflows/db-migration-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Ensure psql client
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -q; then echo "postgres ready"; exit 0; fi
            sleep 2
          done
          echo "postgres did not become ready"; exit 1

      - name: Build minimal prerequisite harness
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0011_harness.sql

      - name: Apply migration 0011 (the reviewed file)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0011_custom_roles_schema.sql

      - name: Re-apply 0011 (idempotency / re-runnability)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0011_custom_roles_schema.sql

      - name: Positive schema verification (V1-V15)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0011_verify.sql

      - name: Negative / behavioral security tests (N1-N7)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0011_negative.sql

      - name: Fail-closed privilege checks (expect denial)
        run: |
          if psql -q -c "set role authenticated; select 1 from roles limit 1;" >/dev/null 2>&1; then
            echo "FAIL: authenticated can read roles"; exit 1
          fi
          echo "PASS: authenticated denied on roles"
          if psql -q -c "set role anon; select 1 from role_permissions limit 1;" >/dev/null 2>&1; then
            echo "FAIL: anon can read role_permissions"; exit 1
          fi
          echo "PASS: anon denied on role_permissions"

      - name: Apply 0012 seed (system roles + default grants)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0012_seed_system_roles_and_grants.sql

      - name: Re-apply 0012 (idempotency)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0012_seed_system_roles_and_grants.sql

      - name: Verify 0012 seed (S1-S8)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0012_verify.sql

      - name: Apply 0013 backfill (membership role_id)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0013_backfill_membership_role_id.sql

      - name: Re-apply 0013 (idempotency)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0013_backfill_membership_role_id.sql

      - name: Verify 0013 backfill (B1-B7)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0013_verify.sql

      - name: Build 0014 RPC harness (auth.uid stub + fixtures)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0014_harness.sql

      - name: 0014 refuses a non-postgres role
        run: |
          if psql -v ON_ERROR_STOP=1 -c "set role authenticated;" -f supabase/migrations/0014_resolve_my_role_permissions_rpc.sql >/dev/null 2>&1; then
            echo "FAIL: 0014 applied as a non-postgres role"; exit 1
          fi
          echo "PASS: 0014 refused a non-postgres role"

      - name: 0014 rejects a conflicting overload (different signature)
        run: |
          psql -v ON_ERROR_STOP=1 -c 'create function public.resolve_my_role_permissions(text) returns integer language sql immutable as $$ select 1 $$;'
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0014_resolve_my_role_permissions_rpc.sql >/dev/null 2>&1; then
            echo "FAIL: 0014 applied despite a conflicting overload"; exit 1
          fi
          echo "PASS: 0014 rejected the conflicting overload"
          psql -v ON_ERROR_STOP=1 -c 'drop function public.resolve_my_role_permissions(text);'

      - name: Apply migration 0014 (secure role-read RPC)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0014_resolve_my_role_permissions_rpc.sql

      - name: Reject duplicate 0014 (create function must not clobber)
        run: |
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0014_resolve_my_role_permissions_rpc.sql >/dev/null 2>&1; then
            echo "FAIL: re-applying 0014 did not error on the existing function"; exit 1
          fi
          echo "PASS: duplicate 0014 cleanly rejected"

      - name: Verify 0014 RPC (definition, privileges, isolation, zero-perm)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0014_verify.sql

      - name: RPC execute-privilege checks (anon denied, authenticated scoped)
        run: |
          if psql -q -c "set role anon; select public.resolve_my_role_permissions('aaaaaaaa-0000-0000-0000-000000000001');" >/dev/null 2>&1; then
            echo "FAIL: anon can execute the RPC"; exit 1
          fi
          echo "PASS: anon denied execute"
          N=$(psql -At -c "set role authenticated; select set_config('request.jwt.claim.sub','11111111-0000-0000-0000-0000000000a1',false); select count(*) from public.resolve_my_role_permissions('aaaaaaaa-0000-0000-0000-000000000001');" | tail -1)
          if [ "$N" != "2" ]; then echo "FAIL: authenticated owner expected 2 rows, got $N"; exit 1; fi
          echo "PASS: authenticated executes; owner sees 2 permission rows"
          M=$(psql -At -c "set role authenticated; select set_config('request.jwt.claim.sub','11111111-0000-0000-0000-0000000000a1',false); select count(*) from public.resolve_my_role_permissions('bbbbbbbb-0000-0000-0000-000000000001');" | tail -1)
          if [ "$M" != "0" ]; then echo "FAIL: authenticated cross-org expected 0 rows, got $M"; exit 1; fi
          echo "PASS: authenticated cross-org isolation (0 rows)"

      - name: Roll back 0014 RPC (idempotent - run twice, both must pass)
        run: |
          psql -v ON_ERROR_STOP=1 -f supabase/validation/0014_rollback.sql
          psql -v ON_ERROR_STOP=1 -f supabase/validation/0014_rollback.sql

      - name: Rollback rehearsal (R1-R2)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0011_rollback.sql

  # Role-management migrations (0015 audit_events + 0016 RPCs). Self-contained
  # harness on a SEPARATE throwaway postgres:16 — no Supabase / Production.
  validate-role-management:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Ensure psql client
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -q; then echo "postgres ready"; exit 0; fi
            sleep 2
          done
          echo "postgres did not become ready"; exit 1

      - name: Build role-management harness (prereqs + auth.uid + fixtures)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0015_0016_harness.sql

      # Review #3: 0015 is strict single-apply (CREATE TABLE/INDEX, no IF NOT
      # EXISTS, absence guards). A non-postgres apply and a conflicting object fail.
      - name: 0015 refuses a non-postgres role
        run: |
          if psql -v ON_ERROR_STOP=1 -c "set role authenticated;" -f supabase/migrations/0015_audit_events.sql >/dev/null 2>&1; then
            echo "FAIL: 0015 applied as a non-postgres role"; exit 1
          fi
          echo "PASS: 0015 refused a non-postgres role"

      - name: 0015 refuses a conflicting pre-existing audit_events
        run: |
          psql -v ON_ERROR_STOP=1 -c "create table public.audit_events (x int);"
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0015_audit_events.sql >/dev/null 2>&1; then
            echo "FAIL: 0015 applied despite a conflicting audit_events table"; exit 1
          fi
          echo "PASS: 0015 rejected the conflicting table"
          psql -v ON_ERROR_STOP=1 -c "drop table public.audit_events;"

      - name: Apply 0015 (audit_events)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0015_audit_events.sql

      - name: Reject duplicate 0015 (absence guard must fail)
        run: |
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0015_audit_events.sql >/dev/null 2>&1; then
            echo "FAIL: re-applying 0015 did not error on the existing table"; exit 1
          fi
          echo "PASS: duplicate 0015 cleanly rejected"

      - name: 0016 refuses a non-postgres role
        run: |
          if psql -v ON_ERROR_STOP=1 -c "set role authenticated;" -f supabase/migrations/0016_role_management_rpcs.sql >/dev/null 2>&1; then
            echo "FAIL: 0016 applied as a non-postgres role"; exit 1
          fi
          echo "PASS: 0016 refused a non-postgres role"

      # Review v4 #1: roles.description is a strict single-creator — 0016 refuses to
      # apply if the column already exists, of ANY type.
      - name: 0016 refuses a pre-existing roles.description (text)
        run: |
          psql -v ON_ERROR_STOP=1 -c "alter table public.roles add column description text;"
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0016_role_management_rpcs.sql >/dev/null 2>&1; then
            echo "FAIL: 0016 applied despite a pre-existing text description"; exit 1
          fi
          echo "PASS: 0016 rejected a pre-existing text description"
          psql -v ON_ERROR_STOP=1 -c "alter table public.roles drop column description;"

      - name: 0016 refuses a pre-existing roles.description (wrong type)
        run: |
          psql -v ON_ERROR_STOP=1 -c "alter table public.roles add column description integer;"
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0016_role_management_rpcs.sql >/dev/null 2>&1; then
            echo "FAIL: 0016 applied despite a wrong-type description"; exit 1
          fi
          echo "PASS: 0016 rejected a wrong-type description"
          psql -v ON_ERROR_STOP=1 -c "alter table public.roles drop column description;"

      - name: Apply 0016 (role-management RPCs)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0016_role_management_rpcs.sql

      - name: Reject duplicate 0016 (no-overload guard must fail)
        run: |
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0016_role_management_rpcs.sql >/dev/null 2>&1; then
            echo "FAIL: re-applying 0016 did not error on existing functions"; exit 1
          fi
          echo "PASS: duplicate 0016 cleanly rejected"

      - name: anon cannot execute a management RPC (expect denial)
        run: |
          if psql -q -c "set role anon; select public.create_org_role('11111111-0000-0000-0000-0000000000aa','x',null,'[]'::jsonb);" >/dev/null 2>&1; then
            echo "FAIL: anon executed a management RPC"; exit 1
          fi
          echo "PASS: anon denied execute"

      - name: Verify 0015/0016 (definition, privileges, behavior)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0015_0016_verify.sql

      # Review #7: the 0016 optimistic-concurrency PREFLIGHT must detect a missing/
      # disabled roles_set_updated_at trigger (BEFORE UPDATE, calls set_updated_at,
      # on a timestamptz column) and return pass=false.
      - name: roles_set_updated_at trigger preflight (present=true, missing=false)
        run: |
          set +e
          PRE='select (exists (select 1 from pg_trigger t join pg_class c on c.oid=t.tgrelid join pg_namespace n on n.oid=c.relnamespace join pg_proc p on p.oid=t.tgfoid where n.nspname=$$public$$ and c.relname=$$roles$$ and t.tgname=$$roles_set_updated_at$$ and t.tgenabled <> $$D$$ and (t.tgtype & 2)<>0 and (t.tgtype & 16)<>0 and p.proname=$$set_updated_at$$) and exists (select 1 from information_schema.columns where table_schema=$$public$$ and table_name=$$roles$$ and column_name=$$updated_at$$ and data_type=$$timestamp with time zone$$)) as pass;'
          P1=$(psql -At -c "$PRE")
          if [ "$P1" != "t" ]; then echo "FAIL: preflight expected pass=t with the trigger present, got '$P1'"; exit 1; fi
          echo "PASS: preflight pass=true with the trigger present"
          psql -v ON_ERROR_STOP=1 -c "drop trigger roles_set_updated_at on public.roles;"
          P2=$(psql -At -c "$PRE")
          if [ "$P2" != "f" ]; then echo "FAIL: preflight expected pass=f with the trigger dropped, got '$P2'"; exit 1; fi
          echo "PASS: preflight pass=false with the trigger missing"
          psql -v ON_ERROR_STOP=1 -c "create trigger roles_set_updated_at before update on public.roles for each row execute function public.set_updated_at();"

      # Review #3/#4: prove the relacl-based PUBLIC/anon/authenticated table-ACL
      # detector is not a false-negative (it catches a deliberately-added PUBLIC grant).
      - name: 0015 PUBLIC-grant detection (relacl catches a PUBLIC table grant)
        run: |
          set +e
          DET="select count(*) from pg_class c cross join lateral aclexplode(coalesce(c.relacl, acldefault('r'::\"char\", c.relowner))) a where c.oid='public.audit_events'::regclass and (a.grantee=0 or a.grantee='anon'::regrole or a.grantee='authenticated'::regrole);"
          BAD0=$(psql -At -c "$DET")
          if [ "$BAD0" != "0" ]; then echo "FAIL: baseline detector expected 0, got '$BAD0'"; exit 1; fi
          psql -v ON_ERROR_STOP=1 -c "grant select on public.audit_events to public;"
          BAD1=$(psql -At -c "$DET")
          if [ "${BAD1:-0}" -lt 1 ]; then echo "FAIL: detector did NOT catch a PUBLIC grant (got '$BAD1')"; exit 1; fi
          echo "PASS: relacl detector catches a PUBLIC table grant (baseline=$BAD0, after=$BAD1)"
          psql -v ON_ERROR_STOP=1 -c "revoke select on public.audit_events from public;"

      # Review #6: prove the normalized role-name uniqueness is CONCURRENCY-safe
      # (the unique index is the sole arbiter; create_org_role has no read-modify-
      # write TOCTOU). Two SEPARATE backends create the same normalized name at the
      # same time -> exactly one commits, the other gets unique_violation (23505).
      - name: Concurrency-safe role name (two parallel creates -> exactly one wins)
        run: |
          set +e   # default shell is `bash -e`; the LOSING psql exits non-zero by design
          SUB='a0000000-0000-0000-0000-0000000000a1'   # active owner of org ...aa
          ORG='11111111-0000-0000-0000-0000000000aa'
          run_create() {
            # ON_ERROR_STOP=1 so a SQL error makes psql exit non-zero (the loser).
            psql -At -v ON_ERROR_STOP=1 \
              -c "set role authenticated; select set_config('request.jwt.claim.sub','$SUB',false); select public.create_org_role('$ORG', '$1', null, '[]'::jsonb);" \
              >"$2" 2>&1
            echo $? >"$2.rc"
          }
          # Same NORMALIZED name (lower(btrim(name))) via case/whitespace variants.
          run_create "ZZ Concurrency Race"         /tmp/race_a &
          run_create "   zz concurrency race   "   /tmp/race_b &
          wait
          RC1=$(cat /tmp/race_a.rc 2>/dev/null || echo 99); RC2=$(cat /tmp/race_b.rc 2>/dev/null || echo 99)
          SUCC=$(( (RC1==0?1:0) + (RC2==0?1:0) ))
          echo "rc_a=$RC1 rc_b=$RC2"
          echo "--- race_a ---"; cat /tmp/race_a
          echo "--- race_b ---"; cat /tmp/race_b
          if [ "$SUCC" -ne 1 ]; then
            echo "FAIL: expected exactly one concurrent create to succeed (got $SUCC)"; exit 1
          fi
          if ! grep -Eq 'already exists|unique_violation|23505' /tmp/race_a /tmp/race_b; then
            echo "FAIL: the losing create did not report a unique-name conflict"; exit 1
          fi
          echo "PASS: concurrent identical-normalized-name creates -> exactly one wins; loser 23505"

      # Review v4 #3/#4/#5: machine-readable, BOOLEAN-ONLY acceptance (exactly
      # true/false, never NULL / never an exception). Positive = t after apply.
      - name: 0015 + 0016 acceptance = true (post-apply)
        run: |
          set +e
          A15=$(psql -At -f supabase/validation/0015_acceptance.sql)
          A16=$(psql -At -f supabase/validation/0016_acceptance.sql)
          echo "0015_acceptance=$A15  0016_acceptance=$A16"
          if [ "$A15" != "t" ]; then echo "FAIL: 0015_acceptance expected t, got '$A15'"; exit 1; fi
          if [ "$A16" != "t" ]; then
            echo "FAIL: 0016_acceptance expected t, got '$A16' — diagnostics:"
            psql -At -c "select 'rls3='||(select count(*) from pg_class c join pg_namespace n on n.oid=c.relnamespace where n.nspname='public' and c.relname in ('roles','role_permissions','audit_events') and c.relkind='r' and c.relrowsecurity);"
            psql -At -c "select 'stamp='||coalesce(col_description(to_regclass('public.roles'), (select ordinal_position from information_schema.columns where table_schema='public' and table_name='roles' and column_name='description')::int),'<none>');"
            psql -At -c "select 'descr_type='||coalesce((select data_type from information_schema.columns where table_schema='public' and table_name='roles' and column_name='description'),'<none>');"
            psql -At -c "select 'idxdef='||coalesce(pg_get_indexdef(to_regclass('public.roles_org_name_norm_uniq')),'<none>');"
            exit 1
          fi
          echo "PASS: both acceptance queries return true"

      - name: acceptance = false (never NULL/exception) on missing index / overload
        run: |
          set +e
          psql -v ON_ERROR_STOP=1 -c "drop index public.roles_org_name_norm_uniq;"
          V=$(psql -At -f supabase/validation/0016_acceptance.sql); RC=$?
          if [ "$RC" -ne 0 ] || [ "$V" != "f" ]; then echo "FAIL: missing index expected boolean 'f', got '$V' (rc$RC)"; exit 1; fi
          echo "PASS: missing index -> 0016 acceptance = f"
          psql -v ON_ERROR_STOP=1 -c "create unique index roles_org_name_norm_uniq on public.roles (org_id, lower(btrim(name)));"
          psql -v ON_ERROR_STOP=1 -c "create function public.list_org_roles(text) returns int language sql as \$\$ select 1 \$\$;"
          V=$(psql -At -f supabase/validation/0016_acceptance.sql); RC=$?
          if [ "$RC" -ne 0 ] || [ "$V" != "f" ]; then echo "FAIL: overload expected boolean 'f', got '$V' (rc$RC)"; exit 1; fi
          echo "PASS: function overload -> 0016 acceptance = f"
          psql -v ON_ERROR_STOP=1 -c "drop function public.list_org_roles(text);"

      - name: Roll back 0015/0016 (run twice - idempotent, both must pass)
        run: |
          psql -v ON_ERROR_STOP=1 -f supabase/validation/0015_0016_rollback.sql
          psql -v ON_ERROR_STOP=1 -f supabase/validation/0015_0016_rollback.sql

      # Review v4 #5: after rollback (all objects gone) the acceptance queries must
      # still return exactly 'f' — never NULL, never an exception.
      - name: acceptance = false on the fully-rolled-back (empty) schema
        run: |
          set +e
          A15=$(psql -At -f supabase/validation/0015_acceptance.sql); RC15=$?
          A16=$(psql -At -f supabase/validation/0016_acceptance.sql); RC16=$?
          echo "0015=$A15(rc$RC15) 0016=$A16(rc$RC16)"
          if [ "$RC15" -ne 0 ] || [ "$RC16" -ne 0 ]; then echo "FAIL: acceptance threw on missing objects"; exit 1; fi
          if [ "$A15" != "f" ] || [ "$A16" != "f" ]; then echo "FAIL: acceptance expected 'f' on empty schema (got '$A15'/'$A16')"; exit 1; fi
          echo "PASS: acceptance is boolean-only 'f' on the empty schema"

      # Review v4 #1: the PRE-DATA rollback must NOT drop a pre-existing (unstamped)
      # description column (only a 0016-stamped one).
      - name: rollback preserves a pre-existing (unstamped) roles.description
        run: |
          set +e
          psql -v ON_ERROR_STOP=1 -c "alter table public.roles add column description text;"  # no provenance stamp
          psql -f supabase/validation/0015_0016_rollback.sql >/dev/null 2>&1                    # its col=0 assertion will trip; ignored
          PRESENT=$(psql -At -c "select count(*) from information_schema.columns where table_schema='public' and table_name='roles' and column_name='description';")
          if [ "$PRESENT" != "1" ]; then echo "FAIL: rollback dropped a pre-existing unstamped description (present=$PRESENT)"; exit 1; fi
          echo "PASS: rollback preserved the pre-existing unstamped description"
          psql -v ON_ERROR_STOP=1 -c "alter table public.roles drop column description;"

  # Membership role_id sync (0017): system-role provisioning for existing AND new
  # orgs + a BEFORE INSERT/UPDATE trigger that keeps the system role_id pointer in
  # sync WITHOUT clobbering a custom role_id. Separate throwaway postgres:16.
  validate-membership-sync:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Ensure psql client
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -q; then echo "postgres ready"; exit 0; fi
            sleep 2
          done
          echo "postgres did not become ready"; exit 1

      - name: Build membership-sync harness (prereqs + fixtures)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0017_harness.sql

      - name: 0017 refuses a non-postgres role
        run: |
          if psql -v ON_ERROR_STOP=1 -c "set role authenticated;" -f supabase/migrations/0017_membership_role_id_sync.sql >/dev/null 2>&1; then
            echo "FAIL: 0017 applied as a non-postgres role"; exit 1
          fi
          echo "PASS: 0017 refused a non-postgres role"

      # Review v4 #2: the in-migration drift guard STOPS (before COMMIT) on every
      # NON-REPAIRABLE drift category. Each case is injected, 0017 is attempted
      # (must abort), then the injection is removed so the real apply is on a clean
      # state. (Cross-org/dangling role_id is enforced by the composite FK, so it
      # cannot be injected here; the guard covers it defensively.)
      - name: 0017 drift guard rejects each NON-REPAIRABLE drift category
        run: |
          set +e
          ORG='aaaa1111-0000-0000-0000-00000000000a'
          EMP='11110000-0000-0000-0000-0000000000e1'
          A1='d0000000-0000-0000-0000-0000000000a1'
          expect_reject() {
            if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0017_membership_role_id_sync.sql >/dev/null 2>&1; then
              echo "FAIL: 0017 applied despite drift [$1]"; exit 1
            fi
            echo "PASS: 0017 aborted on drift [$1]"
          }
          psql -qc "insert into public.roles (org_id,key,name,is_system) values ('$ORG','superadmin','X',true);"
          expect_reject "extra-system-role"
          psql -qc "delete from public.roles where org_id='$ORG' and key='superadmin';"
          psql -qc "insert into public.roles (org_id,key,name,is_system) values ('$ORG','admin','X',false);"
          expect_reject "system-key-not-system"
          psql -qc "delete from public.roles where org_id='$ORG' and key='admin';"
          psql -qc "insert into public.role_permissions (role_id,permission_key,record_scope) values ('$EMP','billing.manage',null);"
          expect_reject "extra-grant-on-system-role"
          psql -qc "delete from public.role_permissions where role_id='$EMP' and permission_key='billing.manage';"
          psql -qc "update public.organization_memberships set role_id='$EMP' where user_id='$A1' and org_id='$ORG';"
          expect_reject "mismatched-nonnull-role_id"
          psql -qc "update public.organization_memberships set role_id=null where user_id='$A1' and org_id='$ORG';"
          psql -qc "insert into public.roles (org_id,key,name,is_system) values ('$ORG','r_dup','employee',false);"
          expect_reject "normalized-name-conflict"
          psql -qc "delete from public.roles where org_id='$ORG' and key='r_dup';"
          psql -qc "insert into public.roles (org_id,key,name,is_system) values ('$ORG','r_own','Owner',false);"
          expect_reject "custom-name-reserved"
          psql -qc "delete from public.roles where org_id='$ORG' and key='r_own';"
          echo "PASS: all injectable drift categories rejected"

      - name: Apply 0017 (system-role provisioning + role_id sync)
        run: psql -v ON_ERROR_STOP=1 -f supabase/migrations/0017_membership_role_id_sync.sql

      - name: Reject duplicate 0017 (no-overload guard must fail)
        run: |
          if psql -v ON_ERROR_STOP=1 -f supabase/migrations/0017_membership_role_id_sync.sql >/dev/null 2>&1; then
            echo "FAIL: re-applying 0017 did not error on existing functions/trigger"; exit 1
          fi
          echo "PASS: duplicate 0017 cleanly rejected"

      - name: Verify 0017 (T1-T19)
        run: psql -v ON_ERROR_STOP=1 -f supabase/validation/0017_verify.sql

      # Review v4 #5/#6: BOOLEAN-ONLY acceptance + the authoritative-cutover preflight.
      - name: 0017 acceptance + cutover preflight = true (post-apply)
        run: |
          set +e
          A=$(psql -At -f supabase/validation/0017_acceptance.sql)
          C=$(psql -At -f supabase/validation/authoritative_cutover_preflight.sql)
          echo "0017_acceptance=$A  cutover_preflight=$C"
          if [ "$A" != "t" ]; then echo "FAIL: 0017_acceptance expected t, got '$A'"; exit 1; fi
          if [ "$C" != "t" ]; then echo "FAIL: cutover preflight expected t, got '$C'"; exit 1; fi
          echo "PASS: 0017 acceptance + cutover preflight both true"

      - name: cutover preflight = false when an active member holds a CUSTOM role
        run: |
          set +e
          ORG='aaaa1111-0000-0000-0000-00000000000a'
          C1='11110000-0000-0000-0000-0000000000c1'
          A1='d0000000-0000-0000-0000-0000000000a1'
          psql -qc "update public.organization_memberships set role_id='$C1' where user_id='$A1' and org_id='$ORG';"
          C=$(psql -At -f supabase/validation/authoritative_cutover_preflight.sql); RC=$?
          if [ "$RC" -ne 0 ] || [ "$C" != "f" ]; then echo "FAIL: cutover preflight expected boolean 'f' with a custom-role member, got '$C' (rc$RC)"; exit 1; fi
          echo "PASS: cutover preflight = f when an active member holds a custom role"
          psql -qc "update public.organization_memberships set role_id=null where user_id='$A1' and org_id='$ORG';"

      - name: Roll back 0017 (run twice - idempotent, both must pass)
        run: |
          psql -v ON_ERROR_STOP=1 -f supabase/validation/0017_rollback.sql
          psql -v ON_ERROR_STOP=1 -f supabase/validation/0017_rollback.sql

      # Review v4 #5: after rollback (functions + trigger gone) the acceptance query
      # must still return exactly 'f' — never NULL, never an exception.
      - name: 0017 acceptance = false after rollback (boolean-only)
        run: |
          set +e
          A=$(psql -At -f supabase/validation/0017_acceptance.sql); RC=$?
          echo "0017_acceptance=$A (rc$RC)"
          if [ "$RC" -ne 0 ] || [ "$A" != "f" ]; then echo "FAIL: 0017 acceptance expected boolean 'f' after rollback, got '$A' (rc$RC)"; exit 1; fi
          echo "PASS: 0017 acceptance = f after rollback (boolean-only)"
