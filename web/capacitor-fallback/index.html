<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AVI.APP</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0d1c32;
        color: #eaf0fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: calc(24px + env(safe-area-inset-top)) 24px
          calc(24px + env(safe-area-inset-bottom));
        text-align: center;
      }
      .mark {
        width: 76px;
        height: 76px;
        border-radius: 18px;
        background: #0054cc;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        font-weight: 800;
        box-shadow: 0 12px 30px -8px rgba(0, 84, 204, 0.7);
      }
      .brand { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
      .msg { font-size: 15px; color: #b9c7e4; max-width: 22rem; line-height: 1.6; }
      .spinner {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #4c9aff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .retry {
        margin-top: 6px;
        padding: 10px 22px;
        border: 0;
        border-radius: 12px;
        background: #0054cc;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">א</div>
      <div class="brand">AVI.APP</div>
      <div class="spinner" aria-hidden="true"></div>
      <div class="msg">
        טוען את AVI.APP…<br />
        אם המסך נשאר — ודא שיש חיבור לאינטרנט ונסה שוב.
      </div>
      <button class="retry" onclick="location.reload()">נסה שוב</button>
    </div>
  </body>
</html>
